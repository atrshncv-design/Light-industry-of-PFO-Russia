        // Форматирование чисел
        function formatNumber(val, format) {
            if (format === 'int') return Math.round(val).toLocaleString('ru-RU');
            if (format === 'float') return val.toFixed(2);
            if (format === 'rank') return Math.round(val);
            return val;
        }

        function formatLegendNumber(val) {
            return Math.round(val).toLocaleString('ru-RU');
        }

        function getNiceStep(min, max, targetBins = 5) {
            const spread = Math.max(max - min, 1);
            const rawStep = spread / targetBins;

            if (rawStep <= 1) return 1;

            const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
            const normalized = rawStep / magnitude;

            let niceBase;
            if (normalized <= 1) niceBase = 1;
            else if (normalized <= 2) niceBase = 2;
            else if (normalized <= 5) niceBase = 5;
            else niceBase = 10;

            return niceBase * magnitude;
        }

        function getLegendEntries(indicator) {
            const ind = INDICATORS[indicator];
            const range = getValueRange(indicator);
            const isRank = ind.format === 'rank';

            if (isRank) {
                return [
                    { color: '#1b5e20', label: '1-3 место (лучший)' },
                    { color: '#4caf50', label: '4-6 место (высокий)' },
                    { color: '#81c784', label: '7-9 место (средний)' },
                    { color: '#c8e6c9', label: '10-12 место (низкий)' },
                    { color: '#ffd54f', label: '13-14 место (худший)' }
                ];
            }

            const step = getNiceStep(range.min, range.max);
            const start = Math.floor(range.min / step) * step;
            const end = Math.max(start + step, Math.ceil(range.max / step) * step);
            const entries = [];

            for (let from = start; from < end; from += step) {
                const to = Math.min(from + step, end);
                const sample = (from + to) / 2;
                const unit = ind.unit ? ` ${ind.unit}` : '';

                entries.push({
                    color: getColor(sample, range.min, range.max, false),
                    label: `${formatLegendNumber(from)}-${formatLegendNumber(to)}${unit}`
                });
            }

            return entries;
        }
        
        // Получить значение показателя для региона
        function getValue(regionName, indicator) {
            const ind = INDICATORS[indicator];
            const region = REGIONS_DATA[regionName];
            if (!region || !region[ind.category]) return 0;
            return region[ind.category][ind.key];
        }
        
        // Вычислить min/max для показателя
        function getValueRange(indicator) {
            const values = Object.keys(REGIONS_DATA).map(r => getValue(r, indicator));
            return {
                min: Math.min(...values),
                max: Math.max(...values)
            };
        }
        
        // Цвет по значению
        function getColor(value, min, max, isRank = false) {
            if (isRank) {
                // Для рангов: 1 = лучший (насыщенный зелёный), 14 = худший (бледный)
                const colors = [
                    '#1b5e20', // 1 - тёмно-зелёный (лучший)
                    '#2e7d32', // 2
                    '#388e3c', // 3
                    '#43a047', // 4
                    '#4caf50', // 5
                    '#66bb6a', // 6
                    '#81c784', // 7
                    '#a5d6a7', // 8
                    '#c8e6c9', // 9
                    '#e8f5e9', // 10 - очень светлый
                    '#fff8e1', // 11 - почти белый с жёлтым оттенком
                    '#ffecb3', // 12 - светло-жёлтый
                    '#ffe082', // 13 - жёлтый
                    '#ffd54f'  // 14 - ярко-жёлтый (худший)
                ];
                const idx = Math.min(Math.max(Math.round(value) - 1, 0), 13);
                return colors[idx];
            }
            
            // Для обычных значений - градиент зелёного
            const ratio = max === min ? 0.5 : (value - min) / (max - min);
            
            // Градиент: светло-зелёный -> насыщенный зелёный -> тёмно-зелёный
            const stops = [
                { pos: 0, r: 232, g: 245, b: 233 },    // очень светлый зелёный
                { pos: 0.25, r: 165, g: 214, b: 167 },  // светло-зелёный
                { pos: 0.5, r: 102, g: 187, b: 106 },   // средний зелёный
                { pos: 0.75, r: 56, g: 142, b: 60 },    // насыщенный зелёный
                { pos: 1, r: 27, g: 94, b: 32 }         // тёмно-зелёный
            ];
            
            let lower = stops[0], upper = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (ratio >= stops[i].pos && ratio <= stops[i + 1].pos) {
                    lower = stops[i];
                    upper = stops[i + 1];
                    break;
                }
            }
            
            const t = (ratio - lower.pos) / (upper.pos - lower.pos);
            const r = Math.round(lower.r + (upper.r - lower.r) * t);
            const g = Math.round(lower.g + (upper.g - lower.g) * t);
            const b = Math.round(lower.b + (upper.b - lower.b) * t);
            
            return `rgb(${r},${g},${b})`;
        }

                    <div class="detail-row"><span class="detail-label">Дубление кожи:</span><span class="detail-value">${formatVal(region.shipment2025.leather_tanning, 'int')}</span></div>
                    <div class="detail-row"><span class="detail-label">Обувь:</span><span class="detail-value">${formatVal(region.shipment2025.leather_footwear, 'int')}</span></div>
                </div>
                
                <div class="category-section">
                    <div class="category-title">Производительность</div>
                    <div class="detail-row"><span class="detail-label">Отдача:</span><span class="detail-value">${formatVal(region.productivity.value, 'float')} тыс. руб./чел.</span></div>
                    <div class="detail-row"><span class="detail-label">Ранг:</span><span class="detail-value"><span class="rank-badge ${getRankClass(region.productivity.rank)}">${region.productivity.rank}</span></span></div>
                </div>
                
                <div class="category-section">
                    <div class="category-title">Специализация</div>
                    <div class="detail-row"><span class="detail-label">Коэффициент:</span><span class="detail-value">${formatVal(region.specialization.coeff, 'float')}</span></div>
                    <div class="detail-row"><span class="detail-label">Ранг:</span><span class="detail-value"><span class="rank-badge ${getRankClass(region.specialization.rank)}">${region.specialization.rank}</span></span></div>
                </div>

                <div class="category-section">
                    <div class="category-title">Подушевое производство</div>
                    <div class="detail-row"><span class="detail-label">Отгрузка на 1 жителя:</span><span class="detail-value">${formatVal(region.perCapita.value, 'float')} тыс. руб./чел.</span></div>
                    <div class="detail-row"><span class="detail-label">Коэффициент:</span><span class="detail-value">${formatVal(region.perCapita.coeff, 'float')}</span></div>
                    <div class="detail-row"><span class="detail-label">Ранг:</span><span class="detail-value"><span class="rank-badge ${getRankClass(region.perCapita.rank)}">${region.perCapita.rank}</span></span></div>
                </div>
            `;
        }
        
        // Отрисовка карты
        function renderMap(indicator) {
            const svg = document.getElementById('map-svg');
            const ind = INDICATORS[indicator];
            const range = getValueRange(indicator);
            const isRank = ind.format === 'rank';
            
            svg.innerHTML = '';
            
            for (const [regionName, paths] of Object.entries(SVG_PATHS)) {
                const value = getValue(regionName, indicator);
                const color = getColor(value, range.min, range.max, isRank);
                
                paths.forEach(pathData => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', pathData);
                    path.setAttribute('class', 'region' + (selectedRegion === regionName ? ' selected' : ''));
                    path.setAttribute('fill', color);
                    path.dataset.region = regionName;
                    path.dataset.value = value;
                    
                    path.addEventListener('mouseenter', (e) => showTooltip(e, regionName, value, ind));
                    path.addEventListener('mousemove', moveTooltip);
                    path.addEventListener('mouseleave', hideTooltip);
                    path.addEventListener('click', () => selectRegion(regionName));
                    
                    svg.appendChild(path);
                });
            }
            
            // Обновить заголовок
            document.getElementById('map-title').textContent = TITLES[indicator];

            // Масштабная линейка
            addScaleBar();
        }

        // ---- Масштабная линейка ----
        // Коническая равнопромежуточная проекция: масштаб зависит от широты.
        // Вычисляем км/ед.SVG по проекционным формулам и рисуем линейку
        // внутри SVG (так что она попадает в экспорт PNG).
        function addScaleBar() {
            const svg = document.getElementById('map-svg');
            const vb = svg.viewBox.baseVal;
            const PI = Math.PI;

            // Параметры проекции (те же, что при генерации путей)
            const C1 = 440.7367655, C2 = 1.659498624;
            const NC = 0.818777804, KC = 0.9885, LAM0 = 52;

            // Опорная широта — центр ПФО (~55° с.ш.)
            const refLat = 55;
            const latRad = refLat * PI / 180;
            const rho = C2 - latRad;

            // Сколько SVG-единиц в 1° долготы при refLat
            const dxPerDegLon = C1 * rho * Math.sin(NC * PI / 180) * KC;
            // Сколько км в 1° долготы при refLat
            const kmPerDegLon = 111.32 * Math.cos(latRad);
            const kmPerSvg = kmPerDegLon / dxPerDegLon;

            // Подобрать «хороший» отрезок: цель — 2–4 крупных сегмента,
            // ~22 % ширины карты. Предпочитаем крупнее шаг → меньше меток.
            const targetW = vb.width * 0.22;
            const targetKm = targetW * kmPerSvg;
            const steps   = [200, 100, 50];          // крупный → мелкий
            const segsArr = [2, 3, 4];               // кол-во сегментов
            let segKm = 100, numSeg = 3, bestErr = Infinity;
            for (const d of steps) {
                for (const n of segsArr) {
                    const err = Math.abs(d * n - targetKm) / targetKm;
                    if (err < bestErr) { bestErr = err; segKm = d; numSeg = n; }
                }
            }
            const segW = segKm / kmPerSvg;
            const totalW = segW * numSeg;

            // Размеры и позиция (левый нижний угол карты)
            const barH = 1.6;
            const padX = vb.x + vb.width * 0.03;
            const padY = vb.y + vb.height * 0.965;

            const ns = 'http://www.w3.org/2000/svg';
            const g = document.createElementNS(ns, 'g');
            g.setAttribute('id', 'scale-bar');

            // Полупрозрачная подложка
            const bg = document.createElementNS(ns, 'rect');
            bg.setAttribute('x', padX - 1.2);
            bg.setAttribute('y', padY - barH - 4.2);
            bg.setAttribute('width', totalW + 10);
            bg.setAttribute('height', barH + 9);
            bg.setAttribute('fill', 'rgba(0,0,0,0.55)');
            bg.setAttribute('rx', '0.8');
            g.appendChild(bg);

            // Сегменты (чередующиеся белый / тёмный)
            for (let i = 0; i < numSeg; i++) {
                const r = document.createElementNS(ns, 'rect');
                r.setAttribute('x', padX + i * segW);
                r.setAttribute('y', padY);
                r.setAttribute('width', segW);
                r.setAttribute('height', barH);
                r.setAttribute('fill', i % 2 === 0 ? '#ffffff' : '#1a1a2e');
                r.setAttribute('stroke', '#ffffff');
                r.setAttribute('stroke-width', '0.25');
                g.appendChild(r);
            }

            // Обводка всей линейки
            const border = document.createElementNS(ns, 'rect');
            border.setAttribute('x', padX);
            border.setAttribute('y', padY);
            border.setAttribute('width', totalW);
            border.setAttribute('height', barH);
            border.setAttribute('fill', 'none');
            border.setAttribute('stroke', '#ffffff');
            border.setAttribute('stroke-width', '0.35');
            g.appendChild(border);

            // Черточки (тики) на границах сегментов
            for (let i = 0; i <= numSeg; i++) {
                const tick = document.createElementNS(ns, 'line');
                tick.setAttribute('x1', padX + i * segW);
                tick.setAttribute('y1', padY - 0.6);
                tick.setAttribute('x2', padX + i * segW);
                tick.setAttribute('y2', padY + barH + 0.6);
                tick.setAttribute('stroke', '#ffffff');
                tick.setAttribute('stroke-width', '0.3');
                g.appendChild(tick);
            }

            // Цифровые метки (км) под линейкой
            const fs = Math.max(1.4, barH * 0.9);
            for (let i = 0; i <= numSeg; i++) {
                const t = document.createElementNS(ns, 'text');
                t.setAttribute('x', padX + i * segW);
                t.setAttribute('y', padY + barH + fs + 0.6);
                t.setAttribute('font-size', fs);
                t.setAttribute('fill', '#ffffff');
                t.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
                t.setAttribute('text-anchor', i === 0 ? 'start' : 'middle');
                const km = i * segKm;
                t.textContent = km === 0 ? '0' : String(km);
                g.appendChild(t);
            }

            // Ед. измерения «км» справа
            const unit = document.createElementNS(ns, 'text');
            unit.setAttribute('x', padX + totalW + 1);
            unit.setAttribute('y', padY + barH * 0.55);
            unit.setAttribute('font-size', fs);
            unit.setAttribute('fill', '#ffffff');
            unit.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
            unit.textContent = 'км';
            g.appendChild(unit);

            svg.appendChild(g);
        }
        
        // Tooltip
        function showTooltip(e, region, value, ind) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <div class="tooltip-title">${region}</div>
                <div class="tooltip-value">${formatNumber(value, ind.format)} ${ind.unit}</div>
            `;
            tooltip.classList.add('visible');
            moveTooltip(e);
        }
        
        function moveTooltip(e) {
            const tooltip = document.getElementById('tooltip');
            const rect = document.querySelector('.map-container').getBoundingClientRect();
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }
        
        // Выбор региона
        function selectRegion(regionName) {
            selectedRegion = regionName;
            renderMap(currentIndicator);
            showRegionDetails(regionName);
        }
        
        // Экспорт
        function exportMap() {
            const svg = document.getElementById('map-svg');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const legendEntries = getLegendEntries(currentIndicator);
            
            // Сохраняем пропорции SVG: viewBox width/height
            const vb = svg.viewBox.baseVal;
            const svgAspect = vb.width / vb.height; // 96.67 / 106.20 ≈ 0.9104
            
            // Вставляем в SVG явные width/height, совпадающие с пропорциями viewBox,
            // чтобы при рендере в Image не было искажений
            const rawSvg = new XMLSerializer().serializeToString(svg);
            const svgW = Math.round(vb.width);
            const svgH = Math.round(vb.height);
            const svgData = rawSvg.replace(
                '<svg ',
                '<svg width="' + svgW + '" height="' + svgH + '" '
            );
            
            // Размеры холста — вертикальный, чтобы карта не искажалась
            canvas.width = 1600;
            canvas.height = 1200;
            
            // Карта: высота ~1060, ширина по пропорциям viewBox
            const mapH = 1060;
            const mapW = Math.round(mapH * svgAspect); // ≈ 965
            const mapX = 40;
            const mapY = 70;
            
            const img = new Image();
            img.onload = function() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем карту с правильными пропорциями
                ctx.drawImage(img, mapX, mapY, mapW, mapH);

                // Заголовок
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 26px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(TITLES[currentIndicator], canvas.width / 2, 48);

                // Легенда — справа от карты
                const legendX = mapX + mapW + 30;
                const legendY = mapY + 10;
                const legendWidth = canvas.width - legendX - 30;
                const legendHeight = 90 + legendEntries.length * 52;

                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                roundRect(ctx, legendX, legendY, legendWidth, legendHeight, 18, true, false);

                ctx.strokeStyle = 'rgba(76, 175, 80, 0.45)';
                ctx.lineWidth = 2;
                roundRect(ctx, legendX, legendY, legendWidth, legendHeight, 18, false, true);

                ctx.textAlign = 'left';
                ctx.fillStyle = '#4caf50';
                ctx.font = 'bold 28px Segoe UI';
                ctx.fillText('Легенда', legendX + 24, legendY + 42);

                ctx.font = '18px Segoe UI';
                ctx.fillStyle = '#ffffff';

                legendEntries.forEach((entry, index) => {
                    const rowY = legendY + 80 + index * 52;

                    ctx.fillStyle = entry.color;
                    roundRect(ctx, legendX + 24, rowY - 18, 44, 28, 6, true, false);

                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(entry.label, legendX + 84, rowY + 2);
                });
                
                const link = document.createElement('a');
                link.download = 'pfo-light-industry-map.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
        }

        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();

            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }
        
        // Инициализация
        document.getElementById('indicator').addEventListener('change', (e) => {
            currentIndicator = e.target.value;
            renderMap(currentIndicator);
            updateLegend(currentIndicator);
            updateStats(currentIndicator);
        });
        
        // Запуск
        renderMap(currentIndicator);
        updateLegend(currentIndicator);
        updateStats(currentIndicator);
    </script>
